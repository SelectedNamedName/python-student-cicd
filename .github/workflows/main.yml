name: Python CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install psutil colorama flake8

    - name: Lint with flake8
      run: |
        # Показывает ошибки, но не останавливает работу
        flake8 . --count --exit-zero --statistics

    - name: Run tests
      run: |
        # Теперь, когда файл в корне, эта команда точно его найдет
        python -m unittest test_logic.py

    - name: Build Docker
      run: |
        docker build -t my-app .