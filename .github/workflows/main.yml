name: Python CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil colorama flake8
        # Если у тебя есть requirements.txt, раскомментируй строку ниже:
        # pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 . --count --exit-zero --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run tests
      run: |
        # Добавляем текущую директорию в PYTHONPATH, чтобы тесты видели файлы student.py и utils.py
        export PYTHONPATH=$PYTHONPATH:.
        # Запускаем поиск тестов во всех папках (авто-обнаружение)
        python -m unittest discover -s . -p 'test_*.py'

    - name: Build Docker
      run: |
        docker build -t my-app .